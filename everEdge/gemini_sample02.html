<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch Staggered Glass Effect</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // --- 1. Basic Three.js Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 2;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 2. Mouse Interaction Setup ---
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    // --- 3. Texture Loading ---
    const textureUrl = 'image/sample01.jpg'; // お手元の画像パスに合わせてください
    const texture = new THREE.TextureLoader().load(textureUrl, (t) => {
      const aspect = t.image.width / t.image.height;
      mesh.scale.set(aspect, 1, 1);
    });

    // --- 4. ShaderMaterial Creation ---
    // 2枚目の画像の鋭さを出すため、スライス数を増やし、計算を「ステップ状」にします
    const geometry = new THREE.PlaneGeometry(2, 2, 32, 32);

    const uniforms = {
      uTexture: { value: texture },
      uTime: { value: 0.0 },
      uMouse: { value: mouse }
    };

    const material = new THREE.ShaderMaterial({
      uniforms: uniforms,
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform sampler2D uTexture;
        uniform float uTime;
        uniform vec2 uMouse;

        // 疑似ランダム関数
        float hash(float n) {
            return fract(sin(n) * 43758.5453123);
        }

        void main() {
          // 1. スライス設定 (2枚目のように細かく)
          float numSlices = 120.0;
          float sliceId = floor(vUv.x * numSlices);
          
          // 2. 不規則なズレ（Staggered Offset）の計算
          // sliceIdに基づいて大きな段差を作る
          float noise = hash(sliceId);
          
          // 時間でわずかに揺らしつつ、マウスの高さ(uMouse.y)でズレの強さを制御
          float speed = uTime * 0.5;
          float offset = (noise - 0.5) * 2.0; // -1.0 〜 1.0 の範囲
          
          // マウスとの距離に応じてズレを強調
          float distToMouse = abs(vUv.x - (uMouse.x * 0.5 + 0.5));
          float mouseImpact = exp(-distToMouse * 10.0);
          
          // 垂直方向の大きなズレを生成
          float finalWave = offset * (0.2 + mouseImpact * 0.5);
          finalWave += sin(uTime + sliceId * 0.5) * 0.02; // 微細な震え
          
          vec2 distUv = vUv;
          distUv.y += finalWave;

          // 3. 色収差（2枚目の雰囲気に合わせ、少しシャープに）
          float colorSplit = 0.005 + mouseImpact * 0.01;
          
          vec3 color;
          color.r = texture2D(uTexture, distUv + vec2(colorSplit, 0.0)).r;
          color.g = texture2D(uTexture, distUv).g;
          color.b = texture2D(uTexture, distUv - vec2(colorSplit, 0.0)).b;

          // 画面外（UVの0-1外）をサンプリングした場合は黒くする処理
          if(distUv.y < 0.0 || distUv.y > 1.0) color *= 0.0;

          gl_FragColor = vec4(color, 1.0);
        }
      `,
      transparent: true,
      side: THREE.DoubleSide
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // --- 5. Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      
      // 時間の更新を追加
      uniforms.uTime.value = clock.getElapsedTime();
      
      renderer.render(scene, camera);
    }
    animate();

    // --- 6. Resize Handling ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
